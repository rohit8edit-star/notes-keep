<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D47A1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- App icon background - rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- White note/paper shape -->
  <rect x="48" y="42" width="104" height="120" rx="10" ry="10" fill="url(#pageGrad)" opacity="0.97"/>

  <!-- Pin/bookmark at top center -->
  <rect x="88" y="32" width="24" height="22" rx="5" ry="5" fill="#FDD835"/>
  <rect x="95" y="52" width="10" height="10" rx="2" fill="#FBC02D"/>

  <!-- Lines on the note -->
  <line x1="63" y1="80" x2="137" y2="80" stroke="#90CAF9" stroke-width="3" stroke-linecap="round"/>
  <line x1="63" y1="96" x2="137" y2="96" stroke="#90CAF9" stroke-width="3" stroke-linecap="round"/>
  <line x1="63" y1="112" x2="120" y2="112" stroke="#90CAF9" stroke-width="3" stroke-linecap="round"/>
  <line x1="63" y1="128" x2="110" y2="128" stroke="#BBDEFB" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small checkmark/tick accent bottom right -->
  <circle cx="132" cy="138" r="12" fill="#1565C0"/>
  <polyline points="126,138 130,143 139,133" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
