name: notes_keep
description: Notes Keep - Your thoughts, always safe.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  flutter_quill: ^9.3.10
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
